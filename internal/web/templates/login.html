{{define "login"}}
<div class="centered">
	<div class="panel">
		<h2>{{t "login.heading"}}</h2>
		<form method="post">
			<input type="hidden" name="returnPath" value="{{.ReturnPath}}" />
			<div class="field">
				<label for="email">{{t "login.email"}}</label>
				<input type="email" id="email" name="email" value="{{.Email}}" placeholder="{{t "login.emailPlaceholder"}}" />
			</div>
			{{if .Password}}
				<div class="field">
					<label for="password">{{t "login.password"}}</label>
					<input type="password" id="password" name="password" placeholder="Enter your password" />
				</div>
			{{end}}
			{{if .OTP}}
				<div class="field">
					<label for="otp">{{t "login.otp"}}</label>
					<input type="text" id="otp" name="otp" placeholder="Enter your OTP" />
				</div>
			{{end}}
			<button type="submit" class="btn-primary btn-block">{{t "login.submit"}}</button>
		</form>
	</div>
</div>
{{end}}
